<div class="container">
  <mat-toolbar>
    <span>Add drugs</span>
  </mat-toolbar>

  <mat-card style="margin-top: 10px;">
    <form [formGroup]="form" (ngSubmit)="addDrugs()">
      <mat-grid-list cols="4" rowHeight="70px">
        <mat-grid-tile [colspan]="1" [rowspan]="1">
          <mat-form-field class="ancho">
            <mat-label>Quantity</mat-label>
            <input matInput autocomplete="off" formControlName="quantity">
          </mat-form-field>
        </mat-grid-tile>

        <mat-grid-tile [colspan]="3" [rowspan]="5">
          <img src="./assets/img/usuario.png" width="250" height="250">
        </mat-grid-tile>

        <mat-grid-tile [colspan]="1" [rowspan]="1">
          <mat-form-field class="ancho">
            <mat-label>Name</mat-label>
            <input matInput autocomplete="off" formControlName="name">
          </mat-form-field>
        </mat-grid-tile>

        <mat-grid-tile [colspan]="1" [rowspan]="1">
          <mat-form-field class="ancho">
            <mat-label>Date</mat-label>
            <input matInput autocomplete="off" formControlName="date">
          </mat-form-field>
        </mat-grid-tile>

        <mat-grid-tile [colspan]="1" [rowspan]="1">
          <mat-form-field class="ancho">
            <mat-label>Category</mat-label>
            <input matInput autocomplete="off" formControlName="category">
          </mat-form-field>
        </mat-grid-tile>

        <mat-grid-tile [colspan]="1" [rowspan]="1">
          <mat-form-field class="ancho">
            <mat-label>Price</mat-label>
            <input matInput autocomplete="off" formControlName="price">
          </mat-form-field>
        </mat-grid-tile>

        <mat-grid-tile [colspan]="1" [rowspan]="1">
          <button mat-raised-button style="margin-right: 20px;">Back</button>
          <button type="submit" [disabled]="form.invalid" mat-raised-button color="primary">Accept</button>
        </mat-grid-tile>

      </mat-grid-list>
      
    </form>
  </mat-card>
</div>
